spring:
  application:
    name: telecom-provisioning-orchestrator

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/provisioning}
    username: ${SPRING_DATASOURCE_USERNAME:provisioning}
    password: ${SPRING_DATASOURCE_PASSWORD:provisioning}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.abhaypanday.provisioning"
    listener:
      ack-mode: record

app:
  kafka:
    group-id: provisioning-orchestrator

# Resilience4j protects the (simulated) HSS activation call.
resilience4j:
  retry:
    instances:
      hssActivation:
        max-attempts: 3
        wait-duration: 500ms
  circuitbreaker:
    instances:
      hssActivation:
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

server:
  port: 8080

logging:
  level:
    com.abhaypanday.provisioning: INFO
